<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo hệ thống</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8d7da; /* Nền màu đỏ nhạt cảnh báo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .message-box {
            text-align: center;
            padding: 50px;
            background-color: #ffffff;
            border: 3px solid #dc3545; /* Viền đỏ đậm */
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        h1 {
            color: #dc3545; 
            font-size: 3.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>BẠN ĐÃ BỊ LỪA!</h1>
        
    </div>
</body>
</html>
